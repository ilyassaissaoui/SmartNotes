<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${formMode == 'edit'} ? 'Edit Note | Smart Notes AI' : 'Create Note | Smart Notes AI'">Note form</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-4">
    <div class="page-header">
        <h1 class="display-6 fw-bold" th:text="${formMode == 'edit'} ? 'Edit note' : 'Create note'">Create note</h1>
        <p class="text-muted mb-0">Write your note, pick a category, and add tags separated by commas.</p>
    </div>

    <div class="card card-soft">
        <div class="card-body">
            <form th:object="${noteForm}"
                  th:action="${formMode == 'edit'} ? @{|/notes/${note.id}/update|} : @{/notes}"
                  method="post">

                <div class="mb-3">
                    <label class="form-label">Title</label>
                    <input type="text" class="form-control" th:field="*{title}" placeholder="Enter note title">
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Content</label>
                    <textarea class="form-control" th:field="*{content}" rows="10"
                              placeholder="Write the note content here..."></textarea>
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('content')}" th:errors="*{content}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Category</label>
                    <select class="form-select" th:field="*{categoryId}">
                        <option value="">Select a category</option>
                        <option th:each="category : ${categories}"
                                th:value="${category.id}"
                                th:text="${category.name}">
                        </option>
                    </select>
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('categoryId')}" th:errors="*{categoryId}"></div>
                </div>

                <div class="mb-4">
                    <label class="form-label">Tags</label>
                    <input type="text" class="form-control" th:field="*{tags}" placeholder="java, spring, project">
                    <div class="form-text">Optional. Separate tags with commas.</div>
                </div>

                <div class="d-flex gap-2 flex-wrap">
                    <button class="btn btn-primary" type="submit"
                            th:text="${formMode == 'edit'} ? 'Update note' : 'Create note'">
                        Save
                    </button>
                    <a class="btn btn-outline-secondary"
                       th:href="${formMode == 'edit'} ? @{|/notes/${note.id}|} : @{/notes}">
                        Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
