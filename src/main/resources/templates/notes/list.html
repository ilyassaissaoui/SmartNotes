<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Notes | Smart Notes AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-4">
    <div class="page-header d-flex justify-content-between align-items-center flex-wrap gap-3">
        <div>
            <h1 class="display-6 fw-bold">Notes</h1>
            <p class="text-muted mb-0">Search, filter, and manage your notes.</p>
        </div>
        <a class="btn btn-primary" th:href="@{/notes/new}">Create note</a>
    </div>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <div class="card card-soft mb-4">
        <div class="card-body">
            <form class="row g-3" th:action="@{/notes}" method="get">
                <div class="col-md-5">
                    <label class="form-label">Search</label>
                    <input type="text" class="form-control" name="query" th:value="${query}"
                           placeholder="Search by title or content">
                </div>

                <div class="col-md-3">
                    <label class="form-label">Category</label>
                    <select class="form-select" name="categoryId">
                        <option value="">All categories</option>
                        <option th:each="category : ${categories}"
                                th:value="${category.id}"
                                th:text="${category.name}"
                                th:selected="${selectedCategoryId != null and selectedCategoryId == category.id}">
                        </option>
                    </select>
                </div>

                <div class="col-md-3">
                    <label class="form-label">Tag</label>
                    <select class="form-select" name="tagId">
                        <option value="">All tags</option>
                        <option th:each="tag : ${tags}"
                                th:value="${tag.id}"
                                th:text="${tag.name}"
                                th:selected="${selectedTagId != null and selectedTagId == tag.id}">
                        </option>
                    </select>
                </div>

                <div class="col-md-1 d-grid align-items-end">
                    <button class="btn btn-dark mt-4" type="submit">Go</button>
                </div>
            </form>
        </div>
    </div>

    <div th:if="${notes == null or notes.isEmpty()}" class="card card-soft">
        <div class="card-body empty-state">
            No notes matched your search.
        </div>
    </div>

    <div class="row g-4" th:if="${notes != null and !notes.isEmpty()}">
        <div class="col-lg-6" th:each="note : ${notes}">
            <div class="card card-soft h-100">
                <div class="card-body d-flex flex-column">
                    <div class="d-flex justify-content-between align-items-start gap-2 mb-2">
                        <h4 class="card-title mb-0" th:text="${note.title}">Title</h4>
                        <span class="badge text-bg-primary badge-soft" th:text="${note.category.name}">Category</span>
                    </div>

                    <p class="text-muted mb-3" th:text="${#strings.abbreviate(note.content, 180)}">Preview</p>

                    <div class="mb-3">
                        <span th:if="${note.tags == null or note.tags.isEmpty()}" class="text-muted small">No tags</span>
                        <span th:each="tag : ${note.tags}"
                              class="badge text-bg-light border me-1 mb-1 badge-soft"
                              th:text="${tag.name}">
                            tag
                        </span>
                    </div>

                    <div class="mt-auto d-flex justify-content-between align-items-center flex-wrap gap-2">
                        <small class="text-muted"
                               th:text="'Updated: ' + ${#temporals.format(note.updatedAt, 'dd MMM yyyy HH:mm')}">
                            Updated
                        </small>
                        <div class="d-flex gap-2">
                            <a class="btn btn-sm btn-outline-secondary" th:href="@{|/notes/${note.id}/edit|}">Edit</a>
                            <a class="btn btn-sm btn-primary" th:href="@{|/notes/${note.id}|}">Open</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
