<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Error | Smart Notes AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-5">
    <div class="card card-soft">
        <div class="card-body text-center p-5">
            <h1 class="display-6 fw-bold mb-3" th:text="${errorTitle}">Error</h1>
            <p class="text-muted mb-4" th:text="${errorMessage}">Something went wrong.</p>
            <div class="d-flex gap-2 justify-content-center flex-wrap">
                <a class="btn btn-primary" th:href="${backHref ?: '/notes'}" th:text="${backLabel ?: 'Back to notes'}">Back</a>
                <a class="btn btn-outline-secondary" th:href="@{/notes}">Notes</a>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
